      - paragraph [ref=e186]: "Two insights worth keeping:"
      - list [ref=e187]:
        - listitem [ref=e188]:
          - strong [ref=e189]: Redefine where SEO sits in the funnel.
          - text: In a pulse-style trend, traditional search is not the first driver. In the first 24 hours, what pushed the site to its peak was the social graph, AI answer engines (GEO), and screenshot-based virality.
          - strong [ref=e190]: SEO belongs in the second half — a wide net for residual searches spilling off the wave, not the spark that lights the wave.
        - listitem [ref=e191]:
          - strong [ref=e192]: Product mechanics beat operational hustle.
          - text: Engineers fall into the diligence trap — write more scripts, ship 200 more pages, build 10 more backlinks. None of that compounds. A well-designed “share image with embedded QR” compounds. Linear labor loses to a geometric mechanism, every time.
      - 'heading "IV. Closing: compounding the right loop" [level=2] [ref=e193]'
      - paragraph [ref=e194]: The walkthrough site landed in the middle of the pack, and traffic flatlined after the brief spike. But during those few launch days, watching real-time numbers tick up in GA was a visceral, real positive feedback signal. It made the appeal of chasing fresh keywords very concrete.
      - paragraph [ref=e195]: As a programmer, my underlying infra (edge compute, R2 pipeline, full-auto LLM scraping) is already past the friction point — arguably ahead of pure-marketing operators on that axis.
      - paragraph [ref=e196]:
        - text: What’s next is breaking the “by-the-book SEO” frame. In the next indie / MicroSaaS project, I want to
        - strong [ref=e197]: "graft solid engineering onto growth-hacking primitives: a real viral coefficient mechanism, plus Programmatic SEO for batch sub-page generation."
      - paragraph [ref=e198]: This was just one skirmish on the indie-hacking road. Now that I’ve seen the winners’ hand, next round it’s my turn to bring the asymmetric edge.
