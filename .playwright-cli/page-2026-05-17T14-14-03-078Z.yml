      - paragraph [ref=e93]: I assumed traffic would snowball as I filled out inner pages (eventually 200+ pages, batches of 4–10 walkthroughs every ~4 days). It didn’t. Traffic bled down day by day until UV and PV both dropped to double digits.
      - heading "What I got wrong" [level=3] [ref=e94]
      - list [ref=e95]:
        - listitem [ref=e96]:
          - strong [ref=e97]: Over-designed, under-iterated.
          - text: In the visual pass, chasing “the perfect experience,” I had the AI iterate the design 7 or 8 times. That burned the most valuable hours — the launch-day ramp where a new site builds its initial weight.
        - listitem [ref=e98]:
          - strong [ref=e99]: One-way consumption, zero retention.
          - text: A walkthrough site is by nature read-once-and-leave. With no retention or interaction loop, every user was a single-session user. Day-2 retention was effectively zero.
        - listitem [ref=e100]:
          - strong [ref=e101]: Content and backlinks both starved.
          - text: Once daily work picked up, the site stopped getting fed. Fewer than 10 backlinks at the start, no sustained inbound after, so once competitors flooded in, the early weight got diluted fast.
