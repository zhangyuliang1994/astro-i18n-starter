name: 自动部署到 GitHub Pages

on:
  # 在推送到 main 分支时触发
  push:
    branches:
      - main

  # 在发布 release 时触发
  release:
    types:
      - published

  # 允许手动触发
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 获取 pnpm store 目录
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 缓存 pnpm 依赖
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 安装依赖
        run: pnpm install

      - name: 构建 Astro 网站
        run: pnpm run build
        env:
          SITE_URL: https://zhangyuliang1994.github.io

      - name: 部署到 GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.TOKEN }}
          repository-name: zhangyuliang1994/zhangyuliang1994.github.io
          branch: main
          folder: dist
          commit-message: Deploy from ${{ github.sha }}

  sync-knowledge-base:
    name: 同步文章到 AI 知识库
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 检出完整提交历史
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 检查知识库凭据
        env:
          BLOG_KB_ADMIN_TOKEN: ${{ secrets.BLOG_KB_ADMIN_TOKEN }}
        run: |
          if [ -z "$BLOG_KB_ADMIN_TOKEN" ]; then
            echo "::error::请在仓库 Actions secrets 中配置 BLOG_KB_ADMIN_TOKEN"
            exit 1
          fi

      - name: 增量同步新增、修改和删除的文章
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        env:
          BLOG_KB_ADMIN_TOKEN: ${{ secrets.BLOG_KB_ADMIN_TOKEN }}
          BLOG_KB_WORKER_URL: ${{ vars.BLOG_KB_WORKER_URL || 'https://api.frency.me' }}
          SYNC_BASE_SHA: ${{ github.event.before }}
        run: npm run sync:blog-index

      - name: 全量同步文章
        if: github.event_name != 'push' || github.event.before == '0000000000000000000000000000000000000000'
        env:
          BLOG_KB_ADMIN_TOKEN: ${{ secrets.BLOG_KB_ADMIN_TOKEN }}
          BLOG_KB_WORKER_URL: ${{ vars.BLOG_KB_WORKER_URL || 'https://api.frency.me' }}
        run: npm run sync:blog-index:all
